<meta charset="UTF-8">

<title>Raviraj Sir – Digital Skills Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;500;600;700&family=Mukta+Vaani:wght@400;500;600;700&family=Noto+Sans+Gujarati:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root{
    --bg:#FFFFFF;
    --bg2:#F5F5F7;
    --text:#1D1D1F;
    --text2:#6E6E73;
    --border:#D2D2D7;
    --accent:#0071E3;
    --accent-hover:#0062C3;
    --green:#34C759;
    --radius:28px;
    --radius-btn:999px;
    --radius-input:18px;
    --shadow:0 8px 30px rgba(0,0,0,.08);
    --shadow-lg:0 20px 50px rgba(0,0,0,.10);
  }

  html, body { height: 100%; }

  body {
    background: linear-gradient(180deg, #FFFFFF, #F5F5F7);
    font-family: 'Hind Vadodara', 'Mukta Vaani', 'Noto Sans Gujarati', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: rgba(255,255,255,.82);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-radius: var(--radius);
    width: 100%;
    max-width: 560px;
    padding: 0;
    box-shadow: var(--shadow-lg);
    border: 1px solid rgba(255,255,255,.6);
    opacity: 0;
    transform: translateY(40px) scale(.98);
    animation: pageIn .7s cubic-bezier(.22,1,.36,1) forwards;
  }

  @keyframes pageIn {
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 640px) {
    .card { max-width: 500px; }
  }
  @media (max-width: 480px) {
    .card { max-width: 100%; }
  }

  .card-inner{
    background: transparent;
    border-radius: var(--radius);
    padding: 48px 40px 42px;
  }
  @media (max-width: 480px) {
    .card-inner{ padding: 40px 22px 32px; }
  }

  .ig-icon{
    width:64px;height:64px;border-radius:18px;
    background: linear-gradient(160deg, #F5F5F7, #EDEDF0);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
  }

  .title {
    font-size: 27px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.4;
    margin-bottom: 12px;
    letter-spacing: -0.015em;
  }

  .subtitle {
    font-size: 15px;
    color: var(--text2);
    text-align: center;
    margin-bottom: 36px;
    line-height: 1.6;
    font-family: 'Noto Sans Gujarati', sans-serif;
  }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .field { margin-bottom: 18px; }
  .field label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
    font-family: 'Noto Sans Gujarati', sans-serif;
  }
  .field label svg{stroke:var(--text2);flex-shrink:0;}
  .field input,
  .field select {
    width: 100%;
    background: #FFFFFF;
    border: 1px solid var(--border);
    border-radius: var(--radius-input);
    padding: 16px 17px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Hind Vadodara', sans-serif;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    transition: border-color .3s cubic-bezier(.22,1,.36,1), box-shadow .3s cubic-bezier(.22,1,.36,1), background .3s ease;
  }
  .field input:focus,
  .field select:focus {
    border-color: var(--accent);
    background: var(--bg);
    box-shadow: 0 0 0 5px rgba(0,113,227,.15);
  }
  .field input::placeholder { color: #A1A1A6; }
  .field select option { background: #fff; color: var(--text); }

  .btn {
    width: 100%;
    height: 60px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-btn);
    padding: 0 17px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.2px;
    font-family: 'Hind Vadodara', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    box-shadow: var(--shadow);
    transition: all .35s cubic-bezier(.22,1,.36,1);
  }
  .btn:hover { background: var(--accent-hover); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
  .btn:active { transform: scale(.98); }

  .success {
    display: none;
    text-align: center;
    padding: 30px 0;
    animation: fadeUp .6s cubic-bezier(.22,1,.36,1);
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(24px) scale(.98); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  .success .tick {
    width: 68px; height: 68px; margin: 0 auto 24px;
    border-radius: 50%;
    background: var(--green);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 24px rgba(52,199,89,.28);
  }
  .success h3 {
    font-size: 23px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: -0.01em;
  }
  .success p {
    font-size: 14.5px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 320px;
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-inner">
    <div id="formSection">
      <div class="ig-icon">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5Z"/><path d="M6 12v5c0 1.66 2.69 3 6 3s6-1.34 6-3v-5"/><path d="M22 10v6"/></svg>
      </div>
      <div class="title">Digital Skills શીખો<br>તમારી આવક માટે નવી તકો બનાવો.</div>
      <div class="subtitle">માત્ર 60 સેકન્ડમાં નોંધણી કરો અને આગળની માહિતી WhatsApp પર મેળવો.</div>

      <div class="field">
        <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> તમારું પૂરું નામ (Full Name) *</label>
        <input type="text" id="cf_fullname" placeholder="Full Name">
      </div>

      <div class="field">
        <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg> મોબાઇલ નંબર (WhatsApp Number) *</label>
        <input type="tel" id="cf_phone" placeholder="Number" maxlength="10">
      </div>

      <div class="row2">
        <div class="field">
          <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> ઉંમર (Age) *</label>
          <input type="number" id="cf_age" placeholder="16-35" min="15" max="60">
        </div>
        <div class="field">
          <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><circle cx="9" cy="9" r="5"/><path d="M16.5 16.5 21 21M19 13v4h-4"/></svg> જાતિ (Gender) *</label>
          <select id="cf_gender">
            <option value="">પસંદ કરો</option>
            <option>પુરૂષ (Male)</option>
            <option>સ્ત્રી (Female)</option>
            <option>અન્ય (Other)</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> તમે અત્યારે શું કરો છો? / વ્યવસાય (Profession) *</label>
        <select id="cf_profession">
          <option value="">પસંદ કરો</option>
          <option>વિદ્યાર્થી (Student)</option>
          <option>નોકરીયાત (Working Professional)</option>
          <option>ગૃહિણી (Housewife)</option>
          <option>બિઝનેસ માલિક (Business Owner)</option>
          <option>ફ્રીલાન્સર (Freelancer)</option>
          <option>બેરોજગાર (Unemployed)</option>
          <option>અન્ય (Other)</option>
        </select>
      </div>

      <div class="field">
        <label><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke-width="2"><path d="M20.5 10c0 6-8.5 12-8.5 12s-8.5-6-8.5-12a8.5 8.5 0 0 1 17 0Z"/><circle cx="12" cy="10" r="3"/></svg> તમે કયા જિલ્લામાંથી છો? (District) *</label>
        <select id="cf_district">
          <option value="">પસંદ કરો</option>
          <option>અમદાવાદ (Ahmedabad)</option>
          <option>અમરેલી (Amreli)</option>
          <option>આણંદ (Anand)</option>
          <option>અરવલ્લી (Aravalli)</option>
          <option>બનાસકાંઠા (Banaskantha)</option>
          <option>ભરૂચ (Bharuch)</option>
          <option>ભાવનગર (Bhavnagar)</option>
          <option>બોટાદ (Botad)</option>
          <option>છોટાઉદેપુર (Chhota Udepur)</option>
          <option>દાહોદ (Dahod)</option>
          <option>ડાંગ (Dang)</option>
          <option>દેવભૂમિ દ્વારકા (Devbhumi Dwarka)</option>
          <option>ગાંધીનગર (Gandhinagar)</option>
          <option>ગીર સોમનાથ (Gir Somnath)</option>
          <option>જામનગર (Jamnagar)</option>
          <option>જૂનાગઢ (Junagadh)</option>
          <option>ખેડા (Kheda)</option>
          <option>કચ્છ (Kutch)</option>
          <option>મહીસાગર (Mahisagar)</option>
          <option>મહેસાણા (Mehsana)</option>
          <option>મોરબી (Morbi)</option>
          <option>નર્મદા (Narmada)</option>
          <option>નવસારી (Navsari)</option>
          <option>પંચમહાલ (Panchmahal)</option>
          <option>પાટણ (Patan)</option>
          <option>પોરબંદર (Porbandar)</option>
          <option>રાજકોટ (Rajkot)</option>
          <option>સાબરકાંઠા (Sabarkantha)</option>
          <option>સુરત (Surat)</option>
          <option>સુરેન્દ્રનગર (Surendranagar)</option>
          <option>તાપી (Tapi)</option>
          <option>વડોદરા (Vadodara)</option>
          <option>વલસાડ (Valsad)</option>
          <option>અન્ય રાજ્ય (Other State)</option>
          <option>ભારત બહાર (Outside India)</option>
        </select>
      </div>

      <button class="btn" onclick="submitForm()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
        WhatsApp પર મોકલો
      </button>
    </div>

    <div class="success" id="successSection">
      <span class="tick"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="#fff" stroke-width="2.5"><path d="M20 6 9 17l-5-5"/></svg></span>
      <h3>તમારી નોંધણી સફળ રહી!</h3>
      <p>હવે WhatsApp ખુલશે.<br>કૃપા કરીને Send બટન દબાવીને વાતચીત શરૂ કરો.</p>
    </div>
  </div>
</div>

<script>const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4Yk6y7X_j-lzKHZ0eF8UR2G5IuKneNReXG3L9vSMix0Gvmo8h1UabkXKfWHuK9wgh/exec";
function submitForm() {
  var fullname = document.getElementById('cf_fullname').value.trim();
  var phone  = document.getElementById('cf_phone').value.trim();
  var age    = document.getElementById('cf_age').value.trim();
  var gender = document.getElementById('cf_gender').value;
  var prof   = document.getElementById('cf_profession').value;
  var district = document.getElementById('cf_district').value;
const formData = {
    fullname: fullname,
    phone: phone,
    age: age,
    gender: gender,
    profession: prof,
    district: district
};
  if (!fullname || !phone || !age || !gender || !prof || !district) {
    alert(' બધા fields ભરો!'); return;
  }
  if (phone.length !== 10) {
    alert(' Valid 10-digit number enter karo!'); return;
  }

  var yourNumber = '918347281744';

  var msg = 'નમસ્તે! Raviraj Sir 🚀\nમને ડિજિટલ સ્કિલ અને ડિજિટલ માર્કેટિંગ માં રસ છે. કૃપા કરીને વિગતો શેર કરો.\n\n'
    + '👤 *નામ (Name):* ' + fullname + '\n'
    + '📱 *WhatsApp:* ' + phone + '\n'
    + '🎂 *ઉંમર (Age):* ' + age + '\n'
    + '⚧ *જાતિ (Gender):* ' + gender + '\n'
    + '💼 *વ્યવસાય (Profession):* ' + prof + '\n'
    + '📍 *જિલ્લો (District):* ' + district + '\n\n'
    + 'કૃપા કરીને મને આગળ ની માહિતી આપો✅!';
fetch(SCRIPT_URL, {
  method: "POST",
  body: JSON.stringify(formData),
  headers: {
    "Content-Type": "application/json"
  }
})
.then(response => response.json())
.then(data => {
  console.log("Data Saved:", data);
})
.catch(error => {
  console.error("Error:", error);
});
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = 'block';

  setTimeout(function() {
    window.open('https://wa.me/' + yourNumber + '?text=' + encodeURIComponent(msg), '_blank');
  }, 600);
}
</script>
</body>
</html>
